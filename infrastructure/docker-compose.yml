version: "3.9"

# ── AcademIQ Local Development Stack ────────────────────────────────────────

services:
  # PostgreSQL — primary database
  postgres:
    image: postgres:16-alpine
    container_name: academiq-postgres
    environment:
      POSTGRES_DB: academiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant — vector database (replaces local ChromaDB)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: academiq-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # Redis — cache and session store
  redis:
    image: redis:7-alpine
    container_name: academiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Optional: FastAPI (uncomment for containerized backend) ──────────────
  # api:
  #   build:
  #     context: ../apps/api
  #     dockerfile: Dockerfile
  #   container_name: academiq-api
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - ../apps/api/.env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
